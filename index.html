<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS Production — Servicios</title>
  <meta name="description" content="Producciones artísticas para eventos empresariales privados y corporativos." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      background: #1a0a2e;
    }

    .flyer {
      width: 100%;
      height: auto;
      display: block;
    }

    @media (min-width: 600px) {
      html, body {
        display: flex;
        justify-content: center;
      }
      .flyer {
        max-width: 600px;
      }
    }
  </style>
</head>
<body>
  <img class="flyer" src="flyer.png" alt="CS Production — Producciones artísticas para eventos empresariales" />
</body>
</html>
